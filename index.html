<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Premium</title>

<style>
body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 15px;
}

select, button {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

select {
    background: #1e1e1e;
    color: white;
}

button {
    margin-top: 20px;
    background: #ff9800;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffc107;
}

.resultado {
    margin-top: 20px;
    white-space: pre-line;
    font-size: 16px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
    <h1>🛒 LOJA PREMIUM</h1>

    <label>Escolha o produto</label>
    <select id="produto">
        <option value="1">Assinatura mensal</option>
        <option value="2">Assinatura anual</option>
        <option value="3">Sair</option>
    </select>

    <label>Forma de pagamento</label>
    <select id="pagamento">
        <option value="1">PIX/Dinheiro (-10%)</option>
        <option value="2">Débito (-5%)</option>
        <option value="3">Crédito (+10%)</option>
    </select>

    <button onclick="calcular()">Calcular valor</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
function calcular() {
    let produto = document.getElementById("produto").value;
    let pagamento = document.getElementById("pagamento").value;

    fetch('/calcular', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ produto, pagamento })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultado").innerText = data.resultado;
    });
}
</script>

</body>
</html>
